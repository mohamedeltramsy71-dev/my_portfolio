<div class="card-wrapper">
  <!-- Shadow card behind -->
  <div class="card-shadow"></div>

  <!-- Main card -->
  <div class="card-main">
    <img [src]="photoPath" alt="Profile photo" class="card-main__img" />
    <span class="card-main__rating card-main__rating--bottom">5.0</span>
  </div>

  <!-- Side label -->
  <span class="card-side-label">4.0</span>

  <!-- Arrow -->
  <button class="card-arrow" aria-label="Next">›</button>
</div>
